<!doctype HTML>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link href="/static/css/register.css" rel="stylesheet">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>

        <main class="form-register w-100 m-auto">
            <form action="/register/" method="post">
            <h1 class="h3 mb-3 fw-normal" align='center'>Create a New Account</h1>
                <div class="form-floating mb-2">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username">  
                    <label for="username" class="form-label">Username</label>
                    <div class="invalid-feedback">
                        Please choose a username.
                    </div>
                </div>
                <div class="form-floating mb-2">
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email"> 
                    <label for="email" class="form-label">Email</label>
                    <div class="invalid-feedback">
                        Please enter a valid email address.
                    </div>
                </div>
                <div class="form-floating mb-2">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password">
                    <label for="password" class="form-label">Password</label>
                    <div class="invalid-feedback" id='password_feedback'>
                        Password must be at least 8 characters long and contain both letters and numbers.
                    </div>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password2" name="password2" placeholder="Confirm Password">
                    <label for="password2" class="form-label">Confirm Password</label>
                    <div class="invalid-feedback">
                        Passwords do not match.
                    </div>
                </div>
                <!-- Checkbox to agree to ToS -->
                <div class="checkbox mb-3">
                    <label>
                        <input type="checkbox" value="tos"> I agree to the <a href="/tos/">Terms of Service</a>
                    </label>
                </div>
                {% csrf_token %}
                <button type="submit" class="w-100 btn btn-lg btn-primary">Submit</button>
            </form>
            <p class="mt-5 mb-3 text-muted" align='center'>Already have an account? <a href="/login/"> Login </a></p>
        </main>
    <script src="/static/js/verify_register.js"></script>
</body>
