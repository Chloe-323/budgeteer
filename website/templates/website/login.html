<!doctype HTML>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <link href="/static/css/login.css" rel="stylesheet">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>

        <main class="form-login w-100 m-auto">
            <form action="/login/" method="post">
            <h1 class="h3 mb-3 fw-normal" align='center'>Log In</h1>
                <div class="form-floating mb-2">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Username"> 
                    <label for="username" class="form-label">Username</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password">
                    <label for="password" class="form-label">Password</label>
                </div>
                {% csrf_token %}
                <button type="submit" class="w-100 btn btn-lg btn-primary">Submit</button>
            </form>
            <p class="mt-5 mb-3 text-muted" align='center'>Don't have an account? <a href="/register/"> Register </a></p>
        </main>
</body>
